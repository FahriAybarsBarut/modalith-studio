name: modalith-ci

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check clang-format
        run: |
          find src include apps tests -type f \( -name '*.cpp' -o -name '*.h' -o -name '*.hpp' \) -not -path 'include/modalith/entt/*' \
            | xargs clang-format --dry-run

  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -DMODALITH_BUILD_TESTS=ON -DMODALITH_BUILD_EXAMPLES=ON -DMODALITH_BUILD_GUI=OFF

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure
