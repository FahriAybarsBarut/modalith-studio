name: modalith-release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows-release:
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.3"
          arch: "win64_msvc2022_64"
          cache: true

      - name: Configure
        run: cmake -S . -B build/release -G "Visual Studio 17 2022" -A x64 -DMODALITH_BUILD_TESTS=ON -DMODALITH_BUILD_EXAMPLES=ON

      - name: Build
        run: cmake --build build/release --config Release --parallel

      - name: Test
        run: ctest --test-dir build/release -C Release --output-on-failure

      - name: Stage portable application
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          if (-not $version) { $version = "0.2.0" }
          $stage = "dist/Modalith-Studio-$version-Windows-x64"
          New-Item -ItemType Directory -Force $stage | Out-Null
          Copy-Item build/release/Release/modalith_studio.exe $stage/
          windeployqt --release --qmldir apps/gui/qml --dir $stage "$stage/modalith_studio.exe"
          Compress-Archive -Path "$stage/*" -DestinationPath "dist/Modalith-Studio-$version-Windows-x64.zip" -CompressionLevel Optimal

      - name: Build Windows installer
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          $version = "${{ github.ref_name }}" -replace '^v', ''
          if (-not $version) { $version = "0.2.0" }
          & "C:/Program Files (x86)/Inno Setup 6/ISCC.exe" "/DAppVersion=$version" "/DSourceDir=$PWD/dist/Modalith-Studio-$version-Windows-x64" "/DOutputDir=$PWD/dist" packaging/windows/Modalith.iss

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          gh release create "${{ github.ref_name }}" "dist/Modalith-Studio-Setup-$version.exe" "dist/Modalith-Studio-$version-Windows-x64.zip" --title "Modalith Studio $version" --notes-file CHANGELOG.md

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Modalith-Studio-Windows-x64
          path: |
            dist/*.exe
            dist/*.zip
